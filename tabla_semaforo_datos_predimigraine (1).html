function exportToCSV(rows) {
  const headers = ['Bloque', 'Variable', 'Estado', 'Prioridad', 'Referencia corta', 'Dónde encontrarlo (detallado)', 'Nota'];
  const lines = [headers.join(';')];
  rows.forEach(r => {
    const fields = [
      r.bloque,
      r.variable,
      estadoConfig[r.estado].label,
      prioridadConfig[r.prioridad].label,
      r.refCorta,
      r.donde,
      r.nota,
    ].map(f => {
      const v = String(f ?? '').replace(/"/g, '""');
      return `"${v}"`;
    });
    lines.push(fields.join(';'));
  });
  const csv = '\uFEFF' + lines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `predimigraine_tabla_semaforo_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportToExcel(rows) {
  const exportData = rows.map(r => ({
    'Bloque': r.bloque,
    'Variable': r.variable,
    'Estado': estadoConfig[r.estado].label,
    'Prioridad': prioridadConfig[r.prioridad].label,
    'Referencia corta': r.refCorta,
    'Dónde encontrarlo (detallado)': r.donde,
    'Nota': r.nota,
  }));
  const ws = XLSX.utils.json_to_sheet(exportData);
  ws['!cols'] = [
    { wch: 22 },
    { wch: 42 },
    { wch: 20 },
    { wch: 12 },
    { wch: 35 },
    { wch: 70 },
    { wch: 50 },
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Tabla semáforo');
  XLSX.writeFile(wb, `predimigraine_tabla_semaforo_${new Date().toISOString().slice(0,10)}.xlsx`);
}

      <div style={{ marginTop: '40px', padding: '20px', background: '#fff', border: '1px solid #ddd' }}>
        <h3 style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '11px', letterSpacing: '0.15em', textTransform: 'uppercase', color: '#1a1a1a', margin: '0 0 16px 0' }}>
          Leyenda
        </h3>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '24px', fontSize: '13px' }}>
          <div>
            <strong style={{ display: 'block', marginBottom: '8px' }}>Estado de disponibilidad</strong>
            <div style={{ marginBottom: '6px' }}><span style={{ display: 'inline-block', width: '10px', height: '10px', borderRadius: '50%', background: '#2d6a4f', marginRight: '8px' }}></span>Verde: recogido en el proyecto o disponible en literatura del proyecto</div>
            <div style={{ marginBottom: '6px' }}><span style={{ display: 'inline-block', width: '10px', height: '10px', borderRadius: '50%', background: '#7c5e10', marginRight: '8px' }}></span>Amarillo: parcial, pendiente o reconstruible</div>
            <div><span style={{ display: 'inline-block', width: '10px', height: '10px', borderRadius: '50%', background: '#9b2226', marginRight: '8px' }}></span>Rojo: no recogido. Necesita acción</div>
          </div>
          <div>
            <strong style={{ display: 'block', marginBottom: '8px' }}>Tipo de fuente</strong>
            <div style={{ marginBottom: '4px' }}><span className="ref-source proyecto">proyecto</span> Documentación del proyecto (Solicitud, Justificación Intermedia)</div>
            <div style={{ marginBottom: '4px' }}><span className="ref-source literatura">literatura</span> Artículos del propio proyecto (Fernández-Ferro, Lazaro-Hernandez, Gago-Veiga, SAFE-CGRP)</div>
            <div style={{ marginBottom: '4px' }}><span className="ref-source externo">externo</span> Datos disponibles fuera del proyecto (INE, farmacia hospitalaria, SEN)</div>
            <div><span className="ref-source no-recogido">no-recogido</span> No existe; requiere recogerlo o estimarlo</div>
          </div>
        </div>
      </div>

      <div style={{ marginTop: '32px', padding: '24px', background: '#1a1a1a', color: '#faf8f3' }}>
        <h3 style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '11px', letterSpacing: '0.15em', textTransform: 'uppercase', margin: '0 0 16px 0', color: '#faf8f3' }}>
          Acciones críticas inmediatas
        </h3>
        <ol style={{ margin: 0, paddingLeft: '24px', lineHeight: 1.7, fontSize: '15px' }}>
          <li><strong>Añadir módulo laboral al CRD:</strong> estado laboral, WPAI, jornada y salario o categoría. Sin esto no hay costes indirectos (66,9 % del exceso de coste según Fernández-Ferro 2024).</li>
          <li><strong>Añadir módulo HCRU:</strong> urgencias, primaria, hospitalizaciones por paciente y mes (retrospectivo si necesario).</li>
          <li><strong>Reservar variables del modelo predictivo:</strong> matriz de confusión, sensibilidad, especificidad, VPP, VPN, tiempo de anticipación.</li>
          <li><strong>Construir tabla de costes unitarios</strong> a partir del presupuesto (pág. 36 Solicitud) y tarifas SNS.</li>
          <li><strong>Definir método de utilidad:</strong> ponderación por días de migraña + referencias bibliográficas.</li>
        </ol>
      </div>

      <footer style={{ marginTop: '32px', paddingTop: '16px', borderTop: '1px solid #ddd', fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', letterSpacing: '0.05em', color: '#999', textAlign: 'center' }}>

      </footer>
    </div>
  );
}
